services:
  jenkins:
    image: "jenkins/jenkins"
    container_name: "jenkins-container"
    user: "1000:1000"   # Jenkins default UID:GID
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data-local:/var/jenkins_home
    profiles:
      - pipeline_services
  database:
    image: mysql
    container_name: "mysql-container"
    user: "1000:1000"
    ports:
      - "80:80"
    volumes:
      - mysql-volume:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Roma2026
  grafana:
    image: grafana/grafana
    container_name: grafana-container
    ports:
      - "4040:3000"
    depends_on:
      - database
    profiles:
      - grafana_services
volumes:
  jenkins-data-local:
    external: true
    name: "jenkins-data-local"
  mysql-volume:
    name: "mysql-volume"


    
